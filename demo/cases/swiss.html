<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swiss — Coworking</title>
  <script type="importmap">
  {
    "imports": {
      "sprae": "https://esm.sh/sprae@12",
      "sprae/store": "https://esm.sh/sprae@12/store"
    }
  }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; }
    html { height: 100%; overflow: hidden; }
    body {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgb(79,75,83);
      padding: 2rem;
      font-size: 14px;
    }
    #panel {
      width: min(100%, 340px);
    }
  </style>
</head>
<body>
  <div id="panel"></div>
  <script type="module">
    import settings from '../../index.js'
    import swiss from '../../theme/swiss.js'

    const titleFont = `'Oswald', 'Arial Narrow', sans-serif`
    const labelFont = `'DM Sans', 'Helvetica', sans-serif`
    const valueFont = `'DM Serif Display', 'Georgia', serif`

    const schema = {
      'company': { type: 'text', value: 'Acme Co.', label: 'Company' },
      'name': { type: 'text', value: 'John Smith', label: 'Name' },
      'email': { type: 'text', value: 'john@example.com', label: 'Email' },
      'phone': { type: 'text', value: '555-555-5555', label: 'Phone' },
      'desks': {
        type: 'number', value: 1, min: 1, max: 50,
        label: 'Number of Desks Needed',
        style: '--label-w: 72%',
      },
      'founder': {
        type: 'select',
        variant: 'segmented',
        value: 'Yes',
        options: ['No', 'Yes'],
        label: 'Startup Founder?',
        style: '--label-w: 72%',
      },
      'needs': {
        type: 'select', variant: 'checkboxes', multiple: true,
        value: ['myself'],
        options: [
          { value: 'startup', label: 'A Space For My Startup' },
          { value: 'myself', label: 'A Space For Myself' },
          { value: 'membership', label: 'General Membership' },
          { value: 'events', label: 'A Space For Events' },
        ],
        label: 'Check All That Apply',
        style: '--label-w: 40%',
      },
      'submit': { type: 'button', label: false, text: 'Send My Info', onClick: () => {} },
    }

    const container = document.getElementById('panel')
    let panel

    function create() {
      panel?.[Symbol.dispose]()
      panel = settings(schema, {
        container,
        theme: () => swiss({ titleFont, labelFont, valueFont }),
        title: 'Be in Cahoots',
      })
      const title = container.querySelector('.s-panel-title')
      if (title) {
        const sub = document.createElement('div')
        sub.className = 's-subtitle'
        sub.style.fontFamily = valueFont
        sub.textContent = 'Send us some info about yourself to get started.'
        title.after(sub)
      }
    }

    create()
  </script>
</body>
</html>
